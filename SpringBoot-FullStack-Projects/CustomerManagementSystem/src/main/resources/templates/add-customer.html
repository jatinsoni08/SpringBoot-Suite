<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Add Customer</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Segoe UI', sans-serif;
			background: #f0f2f5;
			display: flex;
			height: 100vh;
			overflow: hidden;
		}

		.sidebar {
			width: 220px;
			background: white;
			border-right: 1px solid #e8e8e8;
			display: flex;
			flex-direction: column;
			flex-shrink: 0;
		}

		.sidebar-logo {
			padding: 20px 16px;
			border-bottom: 1px solid #f0f0f0;
		}

		.sidebar-logo p {
			font-size: 14px;
			font-weight: 600;
			color: #1a73e8;
		}

		.sidebar-logo span {
			font-size: 11px;
			color: #999;
		}

		.nav-section {
			padding: 12px 8px;
			flex: 1;
		}

		.nav-label {
			font-size: 10px;
			color: #bbb;
			padding: 4px 8px 6px;
			letter-spacing: 0.08em;
			text-transform: uppercase;
		}

		.nav-item {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 9px 10px;
			border-radius: 8px;
			font-size: 13px;
			color: #555;
			cursor: pointer;
			margin-bottom: 2px;
			text-decoration: none;
		}

		.nav-item:hover {
			background: #f5f5f5;
			color: #333;
		}

		.nav-item.active {
			background: #e8f0fe;
			color: #1a73e8;
			font-weight: 600;
		}

		.nav-item i {
			font-size: 15px;
			width: 18px;
			text-align: center;
		}

		.nav-item.logout {
			color: #ea4335;
		}

		.nav-item.logout:hover {
			background: #fce8e6;
		}

		.main {
			flex: 1;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.topbar {
			background: white;
			border-bottom: 1px solid #e8e8e8;
			padding: 14px 24px;
		}

		.topbar h2 {
			font-size: 16px;
			font-weight: 600;
			color: #333;
		}

		.content {
			padding: 30px 24px;
			flex: 1;
			overflow-y: auto;
			display: flex;
			justify-content: center;
		}

		.form-card {
			background: white;
			border: 1px solid #e8e8e8;
			border-radius: 12px;
			padding: 30px;
			width: 100%;
			max-width: 520px;
			height: fit-content;
		}

		.form-card h3 {
			font-size: 16px;
			font-weight: 600;
			color: #333;
			margin-bottom: 24px;
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.form-group {
			margin-bottom: 16px;
		}

		label {
			display: block;
			font-size: 12px;
			font-weight: 600;
			color: #666;
			margin-bottom: 6px;
		}

		input {
			width: 100%;
			padding: 10px 14px;
			border: 1px solid #e0e0e0;
			border-radius: 8px;
			font-size: 13px;
			outline: none;
			color: #333;
			transition: border 0.2s;
		}

		input:focus {
			border-color: #1a73e8;
			box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
		}

		.btn-row {
			display: flex;
			gap: 10px;
			margin-top: 24px;
		}

		.btn-save {
			background: #1a73e8;
			color: white;
			border: none;
			padding: 10px 22px;
			border-radius: 8px;
			font-size: 13px;
			cursor: pointer;
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.btn-save:hover {
			background: #1557b0;
		}

		.btn-cancel {
			background: #f5f5f5;
			color: #555;
			border: none;
			padding: 10px 22px;
			border-radius: 8px;
			font-size: 13px;
			cursor: pointer;
			text-decoration: none;
			display: inline-flex;
			align-items: center;
			gap: 6px;
		}

		.btn-cancel:hover {
			background: #ebebeb;
		}
	</style>
</head>

<body>

	<div class="sidebar">
		<div class="sidebar-logo">
			<p>&#128102; CMS</p>
			<span>Customer Management</span>
		</div>
		<div class="nav-section">
			<div class="nav-label">Main</div>
			<a href="/web/customers" class="nav-item">
				<i class="fa-solid fa-house"></i> Dashboard
			</a>
			<!-- sirf ADMIN ko dikhega -->
			<a href="/web/customers/add" class="nav-item" sec:authorize="hasRole('ADMIN')">
				<i class="fa-solid fa-user-plus"></i> Add Customer
			</a>
			<div class="nav-label" style="margin-top: 12px;">Account</div>
			<a href="/logout" class="nav-item logout" onclick="return confirm('Logout karna chahte ho?')">
				<i class="fa-solid fa-right-from-bracket"></i> Logout
			</a>
		</div>
	</div>

	<div class="main">
		<div class="topbar">
			<h2><i class="fa-solid fa-user-plus" style="color:#1a73e8; margin-right:8px;"></i>Add New Customer</h2>
		</div>
		<div class="content">
			<div class="form-card">
				<h3><i class="fa-solid fa-circle-info" style="color:#1a73e8;"></i> Customer Details</h3>
				<!-- Error message (Postman se aayega, browser redirect hoga) -->
				<div th:if="${error}" class="error-msg">
					<i class="fa-solid fa-circle-exclamation"></i>
					<span th:text="${error}"></span>
				</div>
				<form th:action="@{/web/customers/save}" th:object="${customer}" method="post">
					<div class="form-group">
						<label>Customer ID</label>
						<input type="number" th:field="*{id}" placeholder="Enter ID" required />
					</div>
					<div class="form-group">
						<label>Full Name</label>
						<input type="text" th:field="*{name}" placeholder="Enter full name" required />
					</div>
					<div class="form-group">
						<label>City</label>
						<input type="text" th:field="*{city}" placeholder="Enter city" required />
					</div>
					<div class="form-group">
						<label>Mobile Number</label>
						<input type="text" th:field="*{mobile}" placeholder="Enter mobile number" required />
					</div>
					<div class="form-group">
						<label>Email Address</label>
						<input type="email" th:field="*{email}" placeholder="Enter email" required />
					</div>
					<div class="btn-row">
						<button type="submit" class="btn-save">
							<i class="fa-solid fa-floppy-disk"></i> Save Customer
						</button>
						<a href="/web/customers" class="btn-cancel">
							<i class="fa-solid fa-xmark"></i> Cancel
						</a>
					</div>
				</form>
			</div>
		</div>
	</div>

</body>

</html>
